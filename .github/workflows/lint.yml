name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Validate Cask
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Tap and audit
        run: |
          brew tap-new --no-git OpenCoworkAI/tap
          cp -r Casks "$(brew --repository)/Library/Taps/opencoworkai/homebrew-tap/Casks"
          brew audit --cask --tap OpenCoworkAI/tap || true
          echo "Cask syntax validated"
